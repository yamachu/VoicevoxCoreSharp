name: Release packages
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate release version
        id: validate
        run: |
          VERSION="${{ github.ref_name }}"
          jq -e ".version == \"$VERSION\"" ./src/VoicevoxCoreSharp.Core.Unity/package.json
      - name: Delete tag on validation failure
        if: failure()
        run: |
          VERSION="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --delete origin "$VERSION"
          echo "‚ĚĆ „Éź„Éľ„āł„Éß„É≥ś§úŤ®ľ„ĀęŚ§Īśēó„Āó„Āü„Āü„āĀ„ÄĀ„āŅ„āį $VERSION „āíŚČäťô§„Āó„Āĺ„Āó„Āü"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10
      - run: mkdir -p ./artifacts
      - run: |
          dotnet pack src/VoicevoxCoreSharp.Core/VoicevoxCoreSharp.Core.csproj -p:PackageVersion=${{ github.ref_name }} -c Release -o ./artifacts
          # TODO: src/VoicevoxCoreSharp.Experimental/VoicevoxCoreSharp.Experimental.csproj „ĀģśČĪ„ĀĄ„āíŤÄÉ„Āą„āč
      - run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_KEY }} --skip-duplicate
      - run: gh release create ${{github.ref_name}} --generate-notes ./artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
